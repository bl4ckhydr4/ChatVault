
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScopeX | Intelligence Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
      
      :root {
        --bg-primary: #0a0a0a;
        --bg-secondary: #121212;
        --bg-tertiary: #1a1a1a;
        --border-color: rgba(255, 255, 255, 0.08);
        --text-primary: #e5e5e5;
        --text-secondary: #a3a3a3;
        --accent: #d4a373;
        --accent-glow: rgba(212, 163, 115, 0.4);
      }

      body { 
        font-family: 'Inter', sans-serif; 
        background-color: var(--bg-primary);
        color: var(--text-primary);
        margin: 0;
        overflow: hidden;
      }

      /* ScopeX Tactical Grid Background */
      .scopex-bg {
        background-color: #0a0a0a;
        background-image: 
          radial-gradient(circle at 90% 10%, rgba(212, 163, 115, 0.15) 0%, transparent 45%),
          linear-gradient(rgba(212, 163, 115, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(212, 163, 115, 0.03) 1px, transparent 1px),
          linear-gradient(to bottom left, transparent 20%, rgba(0,0,0,0.85) 100%),
          url('https://images.unsplash.com/photo-1533134486753-c833f0ed4866?auto=format&fit=crop&q=80&w=2000');
        background-size: cover, 40px 40px, 40px 40px, cover, cover;
        background-position: center;
        background-attachment: fixed;
      }

      /* Custom Range Sliders */
      input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
      }
      input[type=range]:focus { outline: none; }
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        background: var(--bg-tertiary);
        border-radius: 2px;
        border: 1px solid var(--border-color);
      }
      input[type=range]::-webkit-slider-thumb {
        height: 18px;
        width: 18px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        -webkit-appearance: none;
        margin-top: -8px;
        box-shadow: 0 0 15px var(--accent-glow);
        border: 2px solid #000;
      }

      /* Glassmorphism Classes */
      .glass-panel {
        background: rgba(18, 18, 18, 0.6);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
      }

      .mono { font-family: 'JetBrains Mono', monospace; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

      @keyframes scanline {
        0% { transform: translateY(-100%); opacity: 0; }
        50% { opacity: 0.15; }
        100% { transform: translateY(100vh); opacity: 0; }
      }
      .scanline {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 2px;
        background: var(--accent);
        box-shadow: 0 0 20px var(--accent);
        z-index: 50;
        pointer-events: none;
        animation: scanline 10s linear infinite;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
      }
    }
    </script>
</head>
<body class="scopex-bg">
    <div class="scanline"></div>
    <div id="root"></div>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</body>
</html>
